<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Song Young-Min Guitar Lab - Ending v18</title>
    <style>
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; touch-action: none; }
        body { background-color: #d7ccc8; margin: 0; color: #3e2723; font-family: 'Malgun Gothic', sans-serif; overflow: hidden; display: flex; flex-direction: column; height: 100vh; }
        #splash { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: #1a1a1a; display: flex; flex-direction: column; justify-content: center; align-items: center; z-index: 200; transition: opacity 0.8s ease; }
        #top-bar { background: #231914; display: flex; justify-content: space-between; align-items: center; padding: 10px 15px; height: 90px; border-bottom: 3px solid #5d4037; z-index: 10; }
        .status-item { text-align: center; flex: 1; }
        .label { font-size: 10px; color: #bcaaa4; display: block; margin-bottom: 2px; }
        .value { font-size: 18px; color: #ffca28; font-weight: bold; }
        #nextContainer { background: rgba(0,0,0,0.3); border-radius: 8px; padding: 5px; display: inline-block; border: 1px solid #5d4037; }
        #game-container { flex: 1; position: relative; display: flex; justify-content: center; align-items: center; background: #d7ccc8; overflow: hidden; }
        #watermark-center { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); font-size: 26px; font-weight: 800; color: rgba(255, 120, 0, 0.7); white-space: nowrap; pointer-events: none; z-index: 1; text-align: center; letter-spacing: 1px; line-height: 1.4; }
        #watermark-bottom { position: absolute; middle: 20px; width: 100%; text-align: center; font-size: 14px; font-weight: bold; color: rgba(255, 180, 80, 0.2); pointer-events: none; z-index: 6; letter-spacing: 1.5px; }
        canvas#tetris { background: #757575; border: 4px solid #5d4037; max-width: 95%; max-height: 98%; z-index: 5; position: relative; }
        #chord-notify { position: absolute; top: 30%; width: 100%; text-align: center; font-size: 40px; font-weight: 900; color: #ffca28; text-shadow: 2px 2px 8px rgba(0,0,0,0.6); z-index: 50; display: none; pointer-events: none; }
        
        /* 모달 스타일 유지 및 게임오버 전용 추가 */
        .modal { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); background: #231914; border: 3px solid #ffca28; padding: 25px; text-align: center; z-index: 150; display: none; width: 80%; border-radius: 15px; color: #fff; box-shadow: 0 0 20px rgba(0,0,0,0.8); }
        .modal h2 { color: #ffca28; margin-top: 0; }
        .modal p { font-size: 18px; margin: 15px 0; }
        
        #controls { background: #231914; display: grid; grid-template-columns: 1fr 1fr 1fr 0.6fr; gap: 8px; padding: 12px; height: 130px; border-top: 3px solid #5d4037; z-index: 10; }
        .btn-ctrl { background: #6d4c41; color: #fff; border: none; border-radius: 12px; font-size: 38px; display: flex; justify-content: center; align-items: center; box-shadow: 0 5px #3e2723; }
        .btn-drop { background: #bf360c; font-size: 12px; font-weight: 900; height: 60%; align-self: center; border-radius: 8px; }
        .small-btn { padding: 6px 10px; font-size: 11px; font-weight: bold; background: #4e342e; color: #fff; border: 1px solid #8d6e63; border-radius: 4px; cursor: pointer; }
    </style>
</head>
<body>

<div id="splash">
    <h1 style="color:#ffca28; text-align:center;">SONG, YOUNG-MIN<br>Guitar Lab</h1>
    <p style="color:#bcaaa4;">Ear Training & New Media Art</p>
</div>

<div id="top-bar">
    <div class="status-item"><span class="label">NEXT</span><div id="nextContainer"><canvas id="nextCanvas" width="50" height="50"></canvas></div></div>
    <div class="status-item"><span class="label">SCORE</span><span id="score" class="value">0</span></div>
    <div class="status-item"><span class="label">TIME</span><span id="timer" class="value">00:00</span></div>
    <div class="status-item"><span class="label">LEVEL</span><span id="level" class="value">1</span></div>
    <div style="display:flex; flex-direction:column; gap:2px;">
        <button class="small-btn" onclick="togglePause()">PAUSE</button>
        <button class="small-btn" onclick="location.reload()">RESET</button>
    </div>
</div>

<div id="game-container">
    <div id="watermark-center">SONG, YOUNG-MIN<br>Guitar Lab</div>
    <div id="watermark-bottom">SONG, YOUNG-MIN Guitar Lab</div>
    <div id="chord-notify">MATCH!</div>
    
    <div id="pauseOverlay" class="modal">
        <h2>PAUSED</h2>
        <button class="small-btn" style="padding:15px 30px; font-size:16px;" onclick="togglePause()">RESUME</button>
    </div>

    <div id="gameOverOverlay" class="modal">
        <h2 style="color: #bf360c;">GAME OVER</h2>
        <p>Your Final Score</p>
        <div id="finalScore" style="font-size: 32px; color: #ffca28; font-weight: bold; margin-bottom: 20px;">0</div>
        <button class="small-btn" style="padding:15px 30px; font-size:16px; background:#6d4c41;" onclick="location.reload()">TRY AGAIN</button>
    </div>

    <canvas id="tetris"></canvas>
</div>

<div id="controls">
    <button class="btn-ctrl" id="leftBtn">◀</button>
    <button class="btn-ctrl" id="downBtn">▼</button>
    <button class="btn-ctrl" id="rightBtn">▶</button>
    <button class="btn-ctrl btn-drop" id="dropBtn">DROP</button>
</div>

<script>
    const canvas = document.getElementById('tetris');
    const ctx = canvas.getContext('2d');
    const nCanvas = document.getElementById('nextCanvas');
    const nCtx = nCanvas.getContext('2d');
    const scoreEl = document.getElementById('score');
    const timeEl = document.getElementById('timer');
    const chordNotify = document.getElementById('chord-notify');

    const ROWS = 18, COLS = 10;
    let SQ = 20;
    const NOTES = ['C', 'D', 'E', 'F', 'G', 'A', 'B'];
    const NOTE_FREQS = { 'C': 261.63, 'D': 293.66, 'E': 329.63, 'F': 349.23, 'G': 392.00, 'A': 440.00, 'B': 493.88, '#': 523.25, 'b': 246.94 };
    const CHORDS = [
        {k:'CEG', n:'C Major', f:[261.6, 329.6, 392.0]}, {k:'ADF', n:'D minor', f:[293.6, 349.2, 440.0]},
        {k:'BEG', n:'E minor', f:[329.6, 392.0, 493.8]}, {k:'ACF', n:'F Major', f:[349.2, 440.0, 523.2]},
        {k:'BDG', n:'G Major', f:[392.0, 493.8, 587.3]}, {k:'ACE', n:'A minor', f:[440.0, 523.2, 659.2]},
        {k:'BDF', n:'Bm(b5)', f:[493.8, 587.3, 698.4]}
    ];

    let board = [], score = 0, paused = false, isUserPaused = false, gameOver = false;
    let p = null, nextNote = '', dropStart = Date.now(), gameStart = null, lastRiseTime = 0;
    let audioCtx = null, particles = [];

    function initAudio() { if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)(); if (audioCtx.state === 'suspended') audioCtx.resume(); }

    function playNoteSfx(noteChar) {
        initAudio(); if(!audioCtx) return;
        const now = audioCtx.currentTime;
        const osc = audioCtx.createOscillator();
        const g = audioCtx.createGain();
        osc.type = 'sine';
        osc.frequency.setValueAtTime(NOTE_FREQS[noteChar] || 440, now);
        g.gain.setValueAtTime(0.1, now);
        g.gain.exponentialRampToValueAtTime(0.001, now + 0.3);
        osc.connect(g); g.connect(audioCtx.destination);
        osc.start(); osc.stop(now + 0.3);
    }

    function playHitSfx() {
        initAudio(); const now = audioCtx.currentTime;
        const osc = audioCtx.createOscillator(); const g = audioCtx.createGain();
        osc.type = 'triangle'; osc.frequency.setValueAtTime(120, now);
        g.gain.setValueAtTime(0.2, now); g.gain.exponentialRampToValueAtTime(0.01, now + 0.15);
        osc.connect(g); g.connect(audioCtx.destination);
        osc.start(); osc.stop(now + 0.15);
    }

    function playChordSfx(freqs) {
        initAudio(); const now = audioCtx.currentTime;
        freqs.forEach((f, i) => {
            const osc = audioCtx.createOscillator(); const g = audioCtx.createGain();
            osc.type = 'sine'; osc.frequency.setValueAtTime(f, now + (i * 0.05));
            g.gain.setValueAtTime(0.15, now); g.gain.exponentialRampToValueAtTime(0.01, now + 1.0);
            osc.connect(g); g.connect(audioCtx.destination);
            osc.start(now + (i * 0.05)); osc.stop(now + 1.2);
        });
    }

    class Particle {
        constructor(x, y) {
            this.x = x; this.y = y;
            this.size = Math.random() * 4 + 1;
            this.vx = (Math.random() - 0.5) * 10;
            this.vy = (Math.random() - 0.5) * 10 - 2;
            this.gravity = 0.3;
            this.life = 1.0;
            this.color = "#ffca28";
        }
        update() { this.vy += this.gravity; this.x += this.vx; this.y += this.vy; this.life -= 0.03; }
        draw() { ctx.globalAlpha = this.life; ctx.fillStyle = this.color; ctx.beginPath(); ctx.arc(this.x, this.y, this.size, 0, Math.PI*2); ctx.fill(); ctx.globalAlpha = 1.0; }
    }

    function initBoard() { board = Array.from({length: ROWS}, () => Array.from({length: COLS}, () => ({L:null, f:false, h:false, s:1, fixed: false}))); }

    function drawBlock(ctxObj, x, y, L, f, h, s, size, isFixed) {
        const level = Math.floor(score / 500);
        const levelColors = ["#4e342e", "#2e7d32", "#1565c0", "#6a1b9a", "#bf360c"];
        let blockColor = levelColors[level % levelColors.length];
        if (isFixed) { blockColor = "#ff9800"; } 
        else if (f) { blockColor = "#ffa726"; } 
        else if (L === '#' || L === 'b') { blockColor = "#424242"; }
        ctxObj.save(); ctxObj.translate(x*size + size/2, y*size + size/2); ctxObj.scale(s, s);
        ctxObj.fillStyle = h ? "#fff" : (L ? blockColor : "rgba(255,255,255,0.05)");
        ctxObj.fillRect(-size/2+1, -size/2+1, size-2, size-2);
        if(L) { ctxObj.fillStyle = "#fff"; ctxObj.font = `bold ${size*0.6}px Arial`; ctxObj.textAlign = "center"; ctxObj.fillText(L, 0, size*0.22); }
        ctxObj.restore();
    }

    function drawBoard() {
        ctx.clearRect(0,0,canvas.width,canvas.height);
        for(let r=0; r<ROWS; r++) for(let c=0; c<COLS; c++) drawBlock(ctx, c, r, board[r][c].L, board[r][c].f, board[r][c].h, board[r][c].s, SQ, board[r][c].fixed);
        if(p && !gameOver) drawBlock(ctx, p.x, p.y, p.L, false, false, 1, SQ, false);
        for (let i = particles.length - 1; i >= 0; i--) { particles[i].update(); particles[i].draw(); if (particles[i].life <= 0) particles.splice(i, 1); }
    }

    class Piece {
        constructor(L) { this.L = L; this.x = 4; this.y = 0; }
        collision(dx, dy) {
            let nx = this.x + dx, ny = this.y + dy;
            if(nx<0 || nx>=COLS || ny>=ROWS) return true;
            if(ny>=0 && board[ny][nx].L) return true;
            return false;
        }
        lock() {
            board[this.y][this.x] = {L: this.L, f: false, h: false, s: 1, fixed: false};
            playHitSfx();
            if(this.L==='#') {
                let count=0; while(count<4){
                    let rr=Math.floor(Math.random()*(ROWS-2)) + 2; 
                    let rc=Math.floor(Math.random()*COLS);
                    if(!board[rr][rc].L){ board[rr][rc]={L:NOTES[Math.floor(Math.random()*7)], f:false, h:false, s:1, fixed:true}; count++; }
                }
            } else if(this.L==='b') {
                for(let r=this.y-1; r<=this.y+1; r++) for(let c=this.x-1; c<=this.x+1; c++)
                    if(r>=0 && r<ROWS && c>=0 && c<COLS) board[r][c]={L:null,f:false,h:false,s:1, fixed:false};
            }
            checkBoard();
            
            // [엔딩 로직 핵심]: 새로운 블록을 생성할 수 없으면 게임 오버
            p = new Piece(nextNote); nextNote = getNote(); drawNext();
            if(p.collision(0,0)) { 
                triggerGameOver(); 
            }
        }
    }

    function findConnectedSameNotes(r, c, note, list) {
        const key = `${r},${c}`;
        if (r<0 || r>=ROWS || c<0 || c>=COLS || !board[r][c].L || board[r][c].L !== note || list.has(key)) return;
        list.add(key);
        findConnectedSameNotes(r+1, c, note, list); findConnectedSameNotes(r-1, c, note, list);
        findConnectedSameNotes(r, c+1, note, list); findConnectedSameNotes(r, c-1, note, list);
    }

    function checkBoard() {
        let toDel = new Set(); let currentChordName = ""; let chordFreqs = null;
        const dirs = [[0,1],[1,0],[1,1],[1,-1]];
        for(let r=0; r<ROWS; r++) for(let c=0; c<COLS; c++) {
            if(!board[r][c].L) continue;
            dirs.forEach(d => {
                let combo = []; 
                for(let i=0; i<3; i++) {
                    let nr=r+d[0]*i, nc=c+d[1]*i;
                    if(nr>=0 && nr<ROWS && nc>=0 && nc<COLS && board[nr][nc].L) combo.push({r:nr, c:nc, L:board[nr][nc].L});
                }
                if(combo.length===3) {
                    let txt = combo.map(v=>v.L).sort().join('');
                    let match = CHORDS.find(ch=>ch.k===txt);
                    let isSame3 = (combo[0].L === combo[1].L && combo[1].L === combo[2].L);
                    if(match || isSame3) {
                        currentChordName = match ? match.n : (combo[0].L==='#' ? "# Sharp" : combo[0].L+" Triple");
                        if(match) chordFreqs = match.f;
                        combo.forEach(pos => findConnectedSameNotes(pos.r, pos.c, board[pos.r][pos.c].L, toDel));
                    }
                }
            });
        }
        if(toDel.size > 0) {
            paused = true; chordNotify.innerText = currentChordName; chordNotify.style.display = "block";
            if(chordFreqs) playChordSfx(chordFreqs);
            let start = Date.now();
            function ani() {
                let now = Date.now() - start;
                if(now < 600) {
                    toDel.forEach(key => { const [r, c] = key.split(',').map(Number); board[r][c].h = true; board[r][c].s = 1.0 + (now/600)*0.6; });
                    drawBoard(); requestAnimationFrame(ani);
                } else {
                    toDel.forEach(key => { const [r, c] = key.split(',').map(Number); for(let i=0; i<15; i++) particles.push(new Particle(c*SQ+SQ/2, r*SQ+SQ/2)); board[r][c] = {L:null, f:false, h:false, s:1, fixed:false}; });
                    score += toDel.size * 10; scoreEl.innerText = score;
                    chordNotify.style.display = "none"; applyGravity(); paused = false; drawBoard(); checkBoard();
                }
            }
            ani();
        }
    }

    function applyGravity() {
        for(let c=0; c<COLS; c++) {
            for(let r=ROWS-1; r>0; r--) {
                if(!board[r][c].L) {
                    for(let k=r-1; k>=0; k--) {
                        if(board[k][c].L && !board[k][c].fixed) { board[r][c] = board[k][c]; board[k][c] = {L:null, f:false, h:false, s:1, fixed:false}; break; }
                        if(board[k][c].L && board[k][c].fixed) break; 
                    }
                }
            }
        }
    }

    // [엔딩 처리 함수 추가]
    function triggerGameOver() {
        gameOver = true;
        document.getElementById('finalScore').innerText = score;
        document.getElementById('gameOverOverlay').style.display = 'block';
    }

    function togglePause() { if(gameOver) return; isUserPaused = !isUserPaused; document.getElementById('pauseOverlay').style.display = isUserPaused ? 'block' : 'none'; }
    function getNote() { const r = Math.random(); if(r < 0.05) return '#'; if(r < 0.12) return 'b'; return NOTES[Math.floor(Math.random()*7)]; }
    function drawNext() { nCtx.clearRect(0,0,50,50); drawBlock(nCtx, 0, 0, nextNote, false, false, 1, 50, false); }
    function resize() { SQ = Math.min(document.getElementById('game-container').clientWidth/(COLS+1), document.getElementById('game-container').clientHeight/(ROWS+1)); canvas.width = COLS*SQ; canvas.height = ROWS*SQ; drawBoard(); }

    function run() {
        if(!paused && !isUserPaused && !gameOver) {
            let now = Date.now();
            if(now - dropStart > 850) { if(!p.collision(0,1)) { p.y++; } else { p.lock(); } dropStart = now; }
            if(gameStart && now - lastRiseTime > 60000) {
                // 바닥에서 상승할 때 맨 윗줄에 블록이 있으면 게임 오버
                let topRowFull = board[0].some(cell => cell.L !== null);
                if(topRowFull) { triggerGameOver(); return; }

                for (let r = 0; r < ROWS - 1; r++) board[r] = board[r + 1];
                board[ROWS - 1] = Array.from({length: COLS}, () => ({ L: NOTES[Math.floor(Math.random() * 7)], f: false, h: false, s: 1, fixed: false }));
                lastRiseTime = now;
            }
            let diff = Math.floor((now - gameStart)/1000);
            timeEl.innerText = `${Math.floor(diff/60).toString().padStart(2,'0')}:${(diff%60).toString().padStart(2,'0')}`;
        }
        drawBoard(); if(!gameOver) requestAnimationFrame(run);
    }

    document.getElementById('leftBtn').addEventListener('touchstart', (e) => { e.preventDefault(); if(!gameOver && !p.collision(-1,0)&&!isUserPaused) { p.x--; playNoteSfx(p.L); } });
    document.getElementById('rightBtn').addEventListener('touchstart', (e) => { e.preventDefault(); if(!gameOver && !p.collision(1,0)&&!isUserPaused) { p.x++; playNoteSfx(p.L); } });
    document.getElementById('downBtn').addEventListener('touchstart', (e) => { e.preventDefault(); if(!gameOver && !p.collision(0,1)&&!isUserPaused) p.y++; });
    document.getElementById('dropBtn').addEventListener('touchstart', (e) => { e.preventDefault(); if(!gameOver && !isUserPaused){while(!p.collision(0,1)) p.y++; p.lock();} });

    window.onload = () => {
        initBoard(); resize(); p = new Piece(getNote()); nextNote = getNote(); drawNext();
        setTimeout(() => { document.getElementById('splash').style.opacity = '0'; setTimeout(() => { document.getElementById('splash').style.display='none'; gameStart = Date.now(); lastRiseTime = Date.now(); run(); }, 800); }, 1500);
    };
    window.onresize = resize;
</script>
</body>
</html>
