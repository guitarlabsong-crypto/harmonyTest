<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Song Young-Min Guitar Lab - Pro Edition v8</title>
    <style>
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; touch-action: none; }
        body { background-color: #d7ccc8; margin: 0; color: #3e2723; font-family: 'Malgun Gothic', sans-serif; overflow: hidden; display: flex; flex-direction: column; height: 100vh; }
        #splash { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: #1a1a1a; display: flex; flex-direction: column; justify-content: center; align-items: center; z-index: 200; transition: opacity 0.8s ease; }
        #top-bar { background: #231914; display: flex; justify-content: space-between; align-items: center; padding: 10px 15px; height: 90px; border-bottom: 3px solid #5d4037; }
        .status-item { text-align: center; flex: 1; }
        .label { font-size: 10px; color: #bcaaa4; display: block; margin-bottom: 2px; }
        .value { font-size: 18px; color: #ffca28; font-weight: bold; }
        #nextContainer { background: rgba(0,0,0,0.3); border-radius: 8px; padding: 5px; display: inline-block; border: 1px solid #5d4037; }
        #game-container { flex: 1; position: relative; display: flex; justify-content: center; align-items: center; background: #d7ccc8; }
        canvas#tetris { background: #757575; border: 4px solid #5d4037; max-width: 95%; max-height: 98%; z-index: 2; }
        #watermark { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); font-size: 26px; font-weight: 900; color: rgba(62, 39, 35, 0.12); white-space: nowrap; pointer-events: none; z-index: 1; text-align: center; }
        #chord-notify { position: absolute; top: 35%; width: 100%; text-align: center; font-size: 40px; font-weight: 900; color: #ffca28; z-index: 50; display: none; pointer-events: none; animation: pop 0.8s ease; }
        @keyframes pop { 0% {transform:scale(0.5);} 50% {transform:scale(1.2);} 100% {transform:scale(1);} }
        .modal { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); background: #231914; border: 3px solid #ffca28; padding: 20px; text-align: center; z-index: 150; display: none; width: 80%; border-radius: 15px; color: #fff; }
        #controls { background: #231914; display: grid; grid-template-columns: 1fr 1fr 1fr 0.6fr; gap: 8px; padding: 12px; height: 130px; border-top: 3px solid #5d4037; }
        .btn-ctrl { background: #6d4c41; color: #fff; border: none; border-radius: 12px; font-size: 38px; display: flex; justify-content: center; align-items: center; box-shadow: 0 5px #3e2723; }
        .btn-drop { background: #bf360c; font-size: 12px; font-weight: 900; height: 60%; align-self: center; border-radius: 8px; }
        .small-btn { padding: 6px 10px; font-size: 11px; font-weight: bold; background: #4e342e; color: #fff; border: 1px solid #8d6e63; border-radius: 4px; margin-bottom: 3px; }
    </style>
</head>
<body>

<div id="splash">
    <h1 style="color:#ffca28; text-align:center;">SONG, YOUNG-MIN<br>Guitar Lab</h1>
    <p style="color:#bcaaa4;">Pro Sound & Logic v8</p>
</div>

<div id="top-bar">
    <div class="status-item"><span class="label">NEXT</span><div id="nextContainer"><canvas id="nextCanvas" width="50" height="50"></canvas></div></div>
    <div class="status-item"><span class="label">SCORE</span><span id="score" class="value">0</span></div>
    <div class="status-item"><span class="label">TIME</span><span id="timer" class="value">00:00</span></div>
    <div class="status-item"><span class="label">LEVEL</span><span id="level" class="value">1</span></div>
    <div style="display:flex; flex-direction:column;">
        <button class="small-btn" onclick="togglePause()">PAUSE</button>
        <button class="small-btn" onclick="openResetModal()">RESET</button>
    </div>
</div>

<div id="game-container">
    <div id="watermark">SONG, YOUNG-MIN<br>Guitar Lab</div>
    <div id="chord-notify">MATCH!</div>
    <div id="pauseOverlay" class="modal"><h2>PAUSED</h2><button style="background:#6d4c41; color:white; padding:10px; border:none; border-radius:8px;" onclick="togglePause()">RESUME</button></div>
    <div id="resetModal" class="modal"><h2>RESTART?</h2><button style="background:#bf360c; color:white; padding:10px; border:none; border-radius:8px; margin:5px;" onclick="location.reload()">YES</button><button style="background:#6d4c41; color:white; padding:10px; border:none; border-radius:8px; margin:5px;" onclick="closeResetModal()">NO</button></div>
    <canvas id="tetris"></canvas>
</div>

<div id="controls">
    <button class="btn-ctrl" id="leftBtn">◀</button>
    <button class="btn-ctrl" id="downBtn">▼</button>
    <button class="btn-ctrl" id="rightBtn">▶</button>
    <button class="btn-ctrl btn-drop" id="dropBtn">DROP</button>
</div>

<script>
    const canvas = document.getElementById('tetris');
    const ctx = canvas.getContext('2d');
    const nCanvas = document.getElementById('nextCanvas');
    const nCtx = nCanvas.getContext('2d');
    const scoreEl = document.getElementById('score');
    const timeEl = document.getElementById('timer');
    const chordNotify = document.getElementById('chord-notify');

    const ROWS = 18, COLS = 10;
    let SQ = 20;
    const NOTES = ['C', 'D', 'E', 'F', 'G', 'A', 'B'];
    const CHORDS = [
        {k:'CEG', n:'C Major', f:[261.6, 329.6, 392.0]}, {k:'ADF', n:'D minor', f:[293.6, 349.2, 440.0]},
        {k:'BEG', n:'E minor', f:[329.6, 392.0, 493.8]}, {k:'ACF', n:'F Major', f:[349.2, 440.0, 523.2]},
        {k:'BDG', n:'G Major', f:[392.0, 493.8, 587.3]}, {k:'ACE', n:'A minor', f:[440.0, 523.2, 659.2]},
        {k:'BDF', n:'Bm(b5)', f:[493.8, 587.3, 698.4]}
    ];

    let board = [], score = 0, paused = false, isUserPaused = false, gameOver = false;
    let p = null, nextNote = '', dropStart = Date.now(), gameStart = null;
    let lastRiseTime = 0, audioCtx = null;

    function initAudio() { if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)(); if (audioCtx.state === 'suspended') audioCtx.resume(); }

    function playSfx(type) {
        initAudio(); const now = audioCtx.currentTime; const osc = audioCtx.createOscillator(); const g = audioCtx.createGain();
        if(type==='rise') { osc.type='square'; osc.frequency.setValueAtTime(100, now); osc.frequency.exponentialRampToValueAtTime(400, now+0.3); g.gain.setValueAtTime(0.1, now); g.gain.linearRampToValueAtTime(0, now+0.3); }
        else { osc.type='sine'; osc.frequency.setValueAtTime(150, now); osc.frequency.exponentialRampToValueAtTime(40, now+0.1); g.gain.setValueAtTime(0.3, now); g.gain.exponentialRampToValueAtTime(0.01, now+0.1); }
        osc.connect(g); g.connect(audioCtx.destination); osc.start(); osc.stop(now+0.3);
    }

    function initBoard() { board = Array.from({length: ROWS}, () => Array.from({length: COLS}, () => ({L:null, f:false, h:false, s:1}))); }

    function drawBlock(ctxObj, x, y, L, f, h, s, size) {
        const level = Math.floor(score / 500);
        const colors = ["#4e342e", "#2e7d32", "#1565c0", "#6a1b9a", "#bf360c"];
        const color = colors[level % colors.length];
        ctxObj.save(); ctxObj.translate(x*size + size/2, y*size + size/2); ctxObj.scale(s, s);
        ctxObj.fillStyle = h ? "#fff" : (L ? (f ? "#ffa726" : (L==='#'||L==='b' ? "#424242" : color)) : "rgba(255,255,255,0.05)");
        ctxObj.fillRect(-size/2+1, -size/2+1, size-2, size-2);
        ctxObj.strokeStyle = "rgba(255,255,255,0.1)"; ctxObj.strokeRect(-size/2+1, -size/2+1, size-2, size-2);
        if(L) { ctxObj.fillStyle = "#fff"; ctxObj.font = `bold ${size*0.6}px Arial`; ctxObj.textAlign = "center"; ctxObj.fillText(L, 0, size*0.22); }
        ctxObj.restore();
    }

    function drawBoard() {
        ctx.clearRect(0,0,canvas.width,canvas.height);
        for(let r=0; r<ROWS; r++) for(let c=0; c<COLS; c++) drawBlock(ctx, c, r, board[r][c].L, board[r][c].f, board[r][c].h, board[r][c].s, SQ);
        if(p && !gameOver) drawBlock(ctx, p.x, p.y, p.L, false, false, 1, SQ);
    }

    // 4. 바닥에서 한 줄 상승 시 물리 밀어올리기 로직
    function riseBoard() {
        playSfx('rise');
        // 모든 블록을 한 칸 위로 강제 이동 (고정 블록 포함)
        for (let r = 0; r < ROWS - 1; r++) board[r] = board[r + 1];
        // 바닥에 새 랜덤 블록 생성
        board[ROWS - 1] = Array.from({length: COLS}, () => ({
            L: NOTES[Math.floor(Math.random() * 7)], f: true, h: false, s: 1 
        }));
        if(p && p.collision(0,0)) gameOver = true;
    }

    class Piece {
        constructor(L) { this.L = L; this.x = 4; this.y = 0; }
        collision(dx, dy) {
            let nx = this.x + dx, ny = this.y + dy;
            if(nx<0 || nx>=COLS || ny>=ROWS) return true;
            if(ny>=0 && board[ny][nx].L) return true;
            return false;
        }
        lock() {
            board[this.y][this.x] = {L: this.L, f: false, h: false, s: 1};
            playSfx('hit');
            if(this.L==='#') {
                let c=0; while(c<4){
                    let rr=Math.floor(Math.random()*ROWS), rc=Math.floor(Math.random()*COLS);
                    if(!board[rr][rc].L){board[rr][rc]={L:NOTES[Math.floor(Math.random()*7)],f:true,h:false,s:1};c++;}
                }
            } else if(this.L==='b') {
                for(let r=this.y-1; r<=this.y+1; r++) for(let c=this.x-1; c<=this.x+1; c++)
                    if(r>=0 && r<ROWS && c>=0 && c<COLS) board[r][c]={L:null,f:false,h:false,s:1};
            }
            checkBoard();
            p = new Piece(nextNote); nextNote = getNote(); drawNext();
            if(p.collision(0,0)) gameOver = true;
        }
    }

    function findConnectedSameNotes(r, c, note, list) {
        const key = `${r},${c}`;
        if (r<0 || r>=ROWS || c<0 || c>=COLS || !board[r][c].L || board[r][c].L !== note || list.has(key)) return;
        list.add(key);
        findConnectedSameNotes(r+1, c, note, list); findConnectedSameNotes(r-1, c, note, list);
        findConnectedSameNotes(r, c+1, note, list); findConnectedSameNotes(r, c-1, note, list);
    }

    // 1, 2, 3 핵심 파괴 로직
    function checkBoard() {
        let toDel = new Set(); let currentChordName = "";
        const dirs = [[0,1],[1,0],[1,1],[1,-1]];
        
        for(let r=0; r<ROWS; r++) for(let c=0; c<COLS; c++) {
            if(!board[r][c].L) continue;
            dirs.forEach(d => {
                let combo = []; for(let i=0; i<3; i++) {
                    let nr=r+d[0]*i, nc=c+d[1]*i;
                    if(nr>=0 && nr<ROWS && nc>=0 && nc<COLS && board[nr][nc].L) combo.push({r:nr, c:nc, L:board[nr][nc].L});
                }
                if(combo.length===3) {
                    let txt = combo.map(v=>v.L).sort().join('');
                    let match = CHORDS.find(ch=>ch.k===txt);
                    // 2. 같은 글자 3개 (랜덤 상승 블록 포함) & 3. # 블록 3개
                    let isSame3 = (combo[0].L === combo[1].L && combo[1].L === combo[2].L);
                    
                    // 1. Triad 화음 매치 OR 같은글자3개(단어/샵)
                    if(match || isSame3) {
                        currentChordName = match ? match.n : (combo[0].L==='#' ? "Sharp Triple" : combo[0].L+" Triple");
                        combo.forEach(pos => findConnectedSameNotes(pos.r, pos.c, board[pos.r][pos.c].L, toDel));
                    }
                }
            });
        }
        if(toDel.size > 0) {
            paused = true; chordNotify.innerText = currentChordName; chordNotify.style.display = "block";
            let start = Date.now();
            function ani() {
                let now = Date.now() - start;
                if(now < 600) {
                    toDel.forEach(key => { const [r, c] = key.split(',').map(Number); board[r][c].h = true; board[r][c].s = 1.5; });
                    drawBoard(); requestAnimationFrame(ani);
                } else {
                    toDel.forEach(key => { const [r, c] = key.split(',').map(Number); board[r][c] = {L:null, f:false, h:false, s:1}; });
                    score += toDel.size * 10; scoreEl.innerText = score;
                    document.getElementById('level').innerText = Math.floor(score/500) + 1;
                    chordNotify.style.display = "none";
                    applyGravity(); paused = false; drawBoard(); checkBoard();
                }
            }
            ani();
        }
    }

    // 4. 중력: #으로 생긴 블록들은 영향받지 않고 제자리에 고정
    function applyGravity() {
        for(let c=0; c<COLS; c++) {
            for(let r=ROWS-1; r>0; r--) {
                if(!board[r][c].L) {
                    for(let k=r-1; k>=0; k--) {
                        // f:true(고정블록)은 중력으로 아래로 떨어지지 않음
                        if(board[k][c].L && !board[k][c].f) {
                            board[r][c] = board[k][c];
                            board[k][c] = {L:null, f:false, h:false, s:1};
                            break;
                        }
                        // 고정 블록을 만나면 그 위는 더 이상 떨어뜨리지 않고 유지
                        if(board[k][c].L && board[k][c].f) break;
                    }
                }
            }
        }
    }

    function togglePause() { if(gameOver) return; isUserPaused = !isUserPaused; document.getElementById('pauseOverlay').style.display = isUserPaused ? 'block' : 'none'; }
    function openResetModal() { isUserPaused = true; document.getElementById('resetModal').style.display = 'block'; }
    function closeResetModal() { isUserPaused = false; document.getElementById('resetModal').style.display = 'none'; }
    function getNote() { const r = Math.random(); if(r < 0.05) return '#'; if(r < 0.12) return 'b'; return NOTES[Math.floor(Math.random()*7)]; }
    function drawNext() { nCtx.clearRect(0,0,50,50); drawBlock(nCtx, 0, 0, nextNote, false, false, 1, 50); }

    function run() {
        if(!paused && !isUserPaused && !gameOver) {
            let now = Date.now();
            if(now - dropStart > 900) { if(!p.collision(0,1)) { p.y++; } else { p.lock(); } dropStart = now; }
            if(gameStart && now - lastRiseTime > 60000) { riseBoard(); lastRiseTime = now; }
            let diff = Math.floor((now - gameStart)/1000);
            timeEl.innerText = `${Math.floor(diff/60).toString().padStart(2,'0')}:${(diff%60).toString().padStart(2,'0')}`;
        }
        drawBoard(); if(!gameOver) requestAnimationFrame(run); else { ctx.fillStyle="rgba(0,0,0,0.5)"; ctx.fillRect(0,0,canvas.width,canvas.height); ctx.fillStyle="#fff"; ctx.fillText("GAME OVER", canvas.width/2-40, canvas.height/2); }
    }

    function resize() { SQ = Math.min(document.getElementById('game-container').clientWidth/(COLS+1), document.getElementById('game-container').clientHeight/(ROWS+1)); canvas.width = COLS*SQ; canvas.height = ROWS*SQ; drawBoard(); }
    document.getElementById('leftBtn').addEventListener('touchstart', (e) => { e.preventDefault(); if(!p.collision(-1,0)&&!isUserPaused) p.x--; });
    document.getElementById('rightBtn').addEventListener('touchstart', (e) => { e.preventDefault(); if(!p.collision(1,0)&&!isUserPaused) p.x++; });
    document.getElementById('downBtn').addEventListener('touchstart', (e) => { e.preventDefault(); if(!p.collision(0,1)&&!isUserPaused) p.y++; });
    document.getElementById('dropBtn').addEventListener('touchstart', (e) => { e.preventDefault(); if(!isUserPaused){while(!p.collision(0,1)) p.y++; p.lock();} });

    window.onload = () => {
        initBoard(); resize(); p = new Piece(getNote()); nextNote = getNote(); drawNext();
        setTimeout(() => { document.getElementById('splash').style.opacity = '0'; setTimeout(() => { document.getElementById('splash').style.display='none'; gameStart = Date.now(); lastRiseTime = Date.now(); run(); }, 800); }, 1500);
    };
    window.onresize = resize;
</script>
</body>
</html>
