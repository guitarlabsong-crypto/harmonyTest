<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Song Young-Min Guitar Lab - UI Enhanced</title>
    <style>
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; touch-action: none; }
        body { background-color: #121212; margin: 0; color: #eee; font-family: 'Malgun Gothic', sans-serif; overflow: hidden; display: flex; flex-direction: column; height: 100vh; }
        
        /* 스플래시 */
        #splash { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: #1a1a1a; display: flex; flex-direction: column; justify-content: center; align-items: center; z-index: 200; transition: opacity 0.8s ease; }
        
        /* 상단 바 */
        #top-bar { background: #231914; display: flex; justify-content: space-between; align-items: center; padding: 10px 15px; height: 90px; border-bottom: 3px solid #5d4037; }
        .status-item { text-align: center; flex: 1; }
        .label { font-size: 10px; color: #bcaaa4; display: block; margin-bottom: 2px; }
        .value { font-size: 18px; color: #ffca28; font-weight: bold; }
        
        /* NEXT 블럭 가시성 강화 */
        #nextContainer { background: rgba(0,0,0,0.3); border-radius: 8px; padding: 5px; display: inline-block; border: 1px solid #5d4037; }
        canvas#nextCanvas { vertical-align: middle; }

        /* 게임 메인 */
        #game-container { flex: 1; position: relative; display: flex; justify-content: center; align-items: center; background: #1a1a1a; }
        canvas#tetris { background: #000; border: 4px solid #5d4037; max-width: 95%; max-height: 98%; }
        
        /* 알림 및 팝업 */
        #chord-notify { position: absolute; top: 35%; width: 100%; text-align: center; font-size: 40px; font-weight: 900; color: #ffca28; z-index: 50; display: none; pointer-events: none; }
        
        /* 커스텀 모달 (Reset/Pause용) */
        .modal { 
            position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%);
            background: #231914; border: 3px solid #ffca28; padding: 20px;
            text-align: center; z-index: 150; display: none; width: 80%; border-radius: 15px;
            box-shadow: 0 0 30px rgba(0,0,0,0.8);
        }
        .modal button { 
            margin: 10px; padding: 10px 25px; font-size: 16px; font-weight: bold;
            border: none; border-radius: 8px; cursor: pointer;
        }
        .btn-yes { background: #bf360c; color: white; }
        .btn-no { background: #6d4c41; color: white; }

        /* 컨트롤 */
        #controls { background: #231914; display: grid; grid-template-columns: 1fr 1fr 1fr 0.6fr; gap: 8px; padding: 12px; height: 130px; border-top: 3px solid #5d4037; }
        .btn-ctrl { background: #6d4c41; color: #fff; border: none; border-radius: 12px; font-size: 38px; display: flex; justify-content: center; align-items: center; box-shadow: 0 5px #3e2723; }
        .btn-ctrl:active { transform: translateY(3px); box-shadow: 0 2px #3e2723; background: #8d6e63; }
        .btn-drop { background: #bf360c; font-size: 12px; font-weight: 900; height: 60%; align-self: center; border-radius: 8px; }

        /* 상단 우측 버튼 세트 */
        .top-btns { display: flex; flex-direction: column; gap: 5px; }
        .small-btn { padding: 6px 10px; font-size: 11px; font-weight: bold; background: #4e342e; color: #fff; border: 1px solid #8d6e63; border-radius: 4px; }
    </style>
</head>
<body>

<div id="splash">
    <h1 style="color:#ffca28; text-align:center;">SONG, YOUNG-MIN<br>Guitar Lab</h1>
    <p style="color:#bcaaa4;">Loading Stable Edition v3...</p>
</div>

<div id="top-bar">
    <div class="status-item">
        <span class="label">NEXT</span>
        <div id="nextContainer"><canvas id="nextCanvas" width="50" height="50"></canvas></div>
    </div>
    <div class="status-item"><span class="label">SCORE</span><span id="score" class="value">0</span></div>
    <div class="status-item"><span class="label">TIME</span><span id="timer" class="value">00:00</span></div>
    <div class="top-btns">
        <button id="pauseBtn" class="small-btn" style="background: #ef6c00;">PAUSE</button>
        <button id="resetReqBtn" class="small-btn">RESET</button>
    </div>
</div>

<div id="game-container">
    <div id="chord-notify">MATCH!</div>
    
    <div id="pauseOverlay" class="modal">
        <h2 style="color:#ffca28; margin-top:0;">PAUSED</h2>
        <p>잠시 쉬어가는 중입니다.</p>
        <button class="btn-no" onclick="togglePause()" style="width:80%;">RESUME</button>
    </div>

    <div id="resetModal" class="modal">
        <h2 style="color:#ffca28; margin-top:0;">RESTART?</h2>
        <p>모든 점수가 초기화됩니다.<br>다시 시작하시겠습니까?</p>
        <button class="btn-yes" onclick="location.reload()">YES</button>
        <button class="btn-no" onclick="closeResetModal()">NO</button>
    </div>

    <canvas id="tetris"></canvas>
</div>

<div id="controls">
    <button class="btn-ctrl" id="leftBtn">◀</button>
    <button class="btn-ctrl" id="downBtn">▼</button>
    <button class="btn-ctrl" id="rightBtn">▶</button>
    <button class="btn-ctrl btn-drop" id="dropBtn">DROP</button>
</div>

<script>
    const canvas = document.getElementById('tetris');
    const ctx = canvas.getContext('2d');
    const nCanvas = document.getElementById('nextCanvas');
    const nCtx = nCanvas.getContext('2d');
    const scoreEl = document.getElementById('score');
    const timeEl = document.getElementById('timer');
    const chordNotify = document.getElementById('chord-notify');

    const ROWS = 18, COLS = 10;
    let SQ = 20;
    const NOTES = ['C', 'D', 'E', 'F', 'G', 'A', 'B'];
    const CHORDS = [
        {k:'CEG', n:'C Major', f:[261.6, 329.6, 392.0]}, {k:'ADF', n:'D minor', f:[293.6, 349.2, 440.0]},
        {k:'BEG', n:'E minor', f:[329.6, 392.0, 493.8]}, {k:'ACF', n:'F Major', f:[349.2, 440.0, 523.2]},
        {k:'BDG', n:'G Major', f:[392.0, 493.8, 587.3]}, {k:'ACE', n:'A minor', f:[440.0, 523.2, 659.2]},
        {k:'BDF', n:'Bm(b5)', f:[493.8, 587.3, 698.4]}
    ];

    let board = [], score = 0, paused = false, isUserPaused = false, gameOver = false;
    let p = null, nextNote = '', dropStart = Date.now(), gameStart = null;
    let audioCtx = null;

    function initAudio() {
        if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
        if (audioCtx.state === 'suspended') audioCtx.resume();
    }

    function playSound(f, type='low') {
        initAudio();
        const osc = audioCtx.createOscillator();
        const g = audioCtx.createGain();
        osc.frequency.setValueAtTime(f || (type==='low'?120:500), audioCtx.currentTime);
        g.gain.setValueAtTime(0.3, audioCtx.currentTime);
        g.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.1);
        osc.connect(g); g.connect(audioCtx.destination);
        osc.start(); osc.stop(audioCtx.currentTime + 0.1);
    }

    function initBoard() {
        board = Array.from({length: ROWS}, () => Array.from({length: COLS}, () => ({L:null, f:false, h:false, s:1})));
    }

    // 블럭 그리기 함수 (재사용)
    function drawBlock(ctxObj, x, y, L, f, h, s, size) {
        ctxObj.save();
        ctxObj.translate(x*size + size/2, y*size + size/2);
        ctxObj.scale(s, s);
        ctxObj.fillStyle = h ? "#ffd600" : (L ? (f ? "#2e7d32" : (L==='#'||L==='b' ? "#ffb300" : "#4e342e")) : "rgba(255,255,255,0.05)");
        ctxObj.fillRect(-size/2+1, -size/2+1, size-2, size-2);
        if(L) {
            ctxObj.fillStyle = (L==='#'||L==='b') ? "#000" : "#fff";
            ctxObj.font = `bold ${size*0.6}px Arial`; ctxObj.textAlign = "center"; ctxObj.fillText(L, 0, size*0.22);
        }
        ctxObj.restore();
    }

    function drawBoard() {
        ctx.clearRect(0,0,canvas.width,canvas.height);
        for(let r=0; r<ROWS; r++) for(let c=0; c<COLS; c++) drawBlock(ctx, c, r, board[r][c].L, board[r][c].f, board[r][c].h, board[r][c].s, SQ);
        if(p && !gameOver) drawBlock(ctx, p.x, p.y, p.L, false, false, 1, SQ);
    }

    function drawNext() {
        nCtx.clearRect(0,0,50,50);
        drawBlock(nCtx, 0, 0, nextNote, false, false, 1, 50);
    }

    function getNote() {
        const r = Math.random();
        if(r < 0.05) return '#';
        if(r < 0.15) return 'b';
        return NOTES[Math.floor(Math.random()*7)];
    }

    class Piece {
        constructor(L) { this.L = L; this.x = 4; this.y = 0; }
        collision(dx, dy) {
            let nx = this.x + dx, ny = this.y + dy;
            if(nx<0 || nx>=COLS || ny>=ROWS) return true;
            if(ny>=0 && board[ny][nx].L) return true;
            return false;
        }
        lock() {
            if(this.y <= 0) { gameOver = true; alert("Game Over!"); return; }
            board[this.y][this.x] = {L: this.L, f: false, h: false, s: 1};
            playSound(120);
            if(this.L==='#') {
                let c=0; while(c<8){
                    let rr=Math.floor(Math.random()*ROWS), rc=Math.floor(Math.random()*COLS);
                    if(!board[rr][rc].L){board[rr][rc]={L:NOTES[Math.floor(Math.random()*7)],f:true,h:false,s:1};c++;}
                }
            } else if(this.L==='b') {
                for(let r=this.y-1; r<=this.y+1; r++) for(let c=this.x-1; c<=this.x+1; c++)
                    if(r>=0 && r<ROWS && c>=0 && c<COLS) board[r][c]={L:null,f:false,h:false,s:1};
            }
            checkBoard();
            p = new Piece(nextNote); nextNote = getNote(); drawNext();
        }
    }

    function checkBoard() {
        let toDel = []; let name = ""; const dirs = [[0,1],[1,0],[1,1],[1,-1]];
        for(let r=0; r<ROWS; r++) for(let c=0; c<COLS; c++) {
            if(!board[r][c].L || board[r][c].L==='b') continue;
            dirs.forEach(d => {
                let combo = []; for(let i=0; i<3; i++) {
                    let nr=r+d[0]*i, nc=c+d[1]*i;
                    if(nr>=0 && nr<ROWS && nc>=0 && nc<COLS && board[nr][nc].L) combo.push({r:nr, c:nc, L:board[nr][nc].L});
                }
                if(combo.length===3) {
                    let txt = combo.map(v=>v.L).sort().join('');
                    let match = CHORDS.find(ch=>ch.k===txt);
                    if(match || (combo[0].L===combo[1].L && combo[1].L===combo[2].L)) {
                        combo.forEach(pos => { if(!toDel.some(t=>t.r===pos.r && t.c===pos.c)) toDel.push(pos); });
                        name = match ? match.n : "3-MATCH";
                    }
                }
            });
        }
        if(toDel.length > 0) {
            paused = true; chordNotify.innerText = name; chordNotify.style.display = "block";
            playSound(500, 'mid');
            let start = Date.now();
            function ani() {
                let now = Date.now() - start;
                if(now < 800) {
                    toDel.forEach(v => { board[v.r][v.c].h=true; board[v.r][v.c].s = 1+(now/800*3); });
                    drawBoard(); requestAnimationFrame(ani);
                } else {
                    toDel.forEach(v => { board[v.r][v.c]={L:null,f:false,h:false,s:1}; });
                    score += toDel.length*10; scoreEl.innerText = score;
                    chordNotify.style.display = "none"; applyGravity();
                    paused = false; drawBoard(); checkBoard();
                }
            }
            ani();
        }
    }

    function applyGravity() {
        for(let c=0; c<COLS; c++) for(let r=ROWS-1; r>0; r--) if(!board[r][c].L) {
            for(let k=r-1; k>=0; k--) if(board[k][c].L && !board[k][c].f) {
                board[r][c]=board[k][c]; board[k][c]={L:null,f:false,h:false,s:1}; break;
            }
        }
    }

    function togglePause() {
        isUserPaused = !isUserPaused;
        document.getElementById('pauseOverlay').style.display = isUserPaused ? 'block' : 'none';
    }

    function openResetModal() { isUserPaused = true; document.getElementById('resetModal').style.display = 'block'; }
    function closeResetModal() { isUserPaused = false; document.getElementById('resetModal').style.display = 'none'; }

    function run() {
        if(!paused && !isUserPaused && !gameOver) {
            let now = Date.now();
            if(now - dropStart > 900) {
                if(!p.collision(0,1)) { p.y++; drawBoard(); } else { p.lock(); }
                dropStart = now;
            }
            let diff = Math.floor((now - gameStart)/1000);
            timeEl.innerText = `${Math.floor(diff/60).toString().padStart(2,'0')}:${(diff%60).toString().padStart(2,'0')}`;
        }
        requestAnimationFrame(run);
    }

    function resize() {
        const container = document.getElementById('game-container');
        SQ = Math.min(container.clientWidth / (COLS+1), container.clientHeight / (ROWS+1));
        canvas.width = COLS * SQ; canvas.height = ROWS * SQ;
        drawBoard();
    }

    document.getElementById('leftBtn').addEventListener('touchstart', (e) => { e.preventDefault(); if(!p.collision(-1,0)&&!isUserPaused) p.x--; drawBoard(); });
    document.getElementById('rightBtn').addEventListener('touchstart', (e) => { e.preventDefault(); if(!p.collision(1,0)&&!isUserPaused) p.x++; drawBoard(); });
    document.getElementById('downBtn').addEventListener('touchstart', (e) => { e.preventDefault(); if(!p.collision(0,1)&&!isUserPaused) p.y++; drawBoard(); });
    document.getElementById('dropBtn').addEventListener('touchstart', (e) => { e.preventDefault(); if(!isUserPaused){while(!p.collision(0,1)) p.y++; p.lock(); drawBoard();} });
    document.getElementById('pauseBtn').addEventListener('click', togglePause);
    document.getElementById('resetReqBtn').addEventListener('click', openResetModal);

    window.onload = () => {
        initBoard(); resize();
        p = new Piece(getNote()); nextNote = getNote(); drawNext();
        setTimeout(() => {
            document.getElementById('splash').style.opacity = '0';
            setTimeout(() => document.getElementById('splash').style.display='none', 800);
            gameStart = Date.now(); run();
        }, 1500);
    };
    window.onresize = resize;
</script>
</body>
</html>
