<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Song Young-Min Guitar Lab - Final Edition</title>
    <style>
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; touch-action: none; }
        /* 3. 더 밝아진 배경색 */
        body { background-color: #2c2c2c; margin: 0; color: #eee; font-family: 'Malgun Gothic', sans-serif; overflow: hidden; display: flex; flex-direction: column; height: 100vh; }
        #top-bar { background: #3d2b1f; display: flex; justify-content: space-between; align-items: center; padding: 10px 15px; height: 90px; border-bottom: 3px solid #795548; position: relative; z-index: 10; }
        .status-item { text-align: center; flex: 1; }
        .label { font-size: 10px; color: #d7ccc8; display: block; margin-bottom: 2px; }
        .value { font-size: 18px; color: #ffeb3b; font-weight: bold; }
        
        #game-container { flex: 1; position: relative; display: flex; justify-content: center; align-items: center; background: #3a3a3a; overflow: hidden; }
        
        /* 3. 정자체 워터마크 (투명도 60%) */
        #watermark { 
            position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%);
            font-size: 24px; font-weight: 900; color: rgba(255, 255, 255, 0.06); 
            white-space: nowrap; pointer-events: none; z-index: 1; font-family: 'Arial', sans-serif; text-align: center;
        }

        canvas#tetris { background: rgba(0,0,0,0.5); border: 4px solid #000; z-index: 2; box-shadow: 0 0 20px rgba(0,0,0,0.3); }
        
        #chord-notify { position: absolute; top: 35%; width: 100%; text-align: center; font-size: 40px; font-weight: 900; color: #ffeb3b; z-index: 50; display: none; pointer-events: none; text-shadow: 2px 2px 10px rgba(0,0,0,0.5); }
        
        .modal { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); background: #231914; border: 3px solid #ffca28; padding: 20px; text-align: center; z-index: 150; display: none; width: 80%; border-radius: 15px; }
        .btn-yes { background: #bf360c; color: white; padding: 10px 20px; border:none; border-radius:8px; margin:5px; }
        .btn-no { background: #6d4c41; color: white; padding: 10px 20px; border:none; border-radius:8px; margin:5px; }

        #controls { background: #3d2b1f; display: grid; grid-template-columns: 1fr 1fr 1fr 0.6fr; gap: 8px; padding: 12px; height: 130px; border-top: 3px solid #795548; z-index: 10; }
        .btn-ctrl { background: #8d6e63; color: #fff; border: none; border-radius: 12px; font-size: 38px; display: flex; justify-content: center; align-items: center; box-shadow: 0 5px #5d4037; }
        .btn-drop { background: #e64a19; font-size: 12px; font-weight: 900; height: 60%; align-self: center; border-radius: 8px; }
        .small-btn { padding: 6px 10px; font-size: 11px; font-weight: bold; background: #5d4037; color: #fff; border: 1px solid #8d6e63; border-radius: 4px; margin-bottom: 3px; }
    </style>
</head>
<body>

<div id="top-bar">
    <div class="status-item">
        <span class="label">NEXT</span>
        <div id="nextContainer"><canvas id="nextCanvas" width="40" height="40"></canvas></div>
    </div>
    <div class="status-item"><span class="label">SCORE</span><span id="score" class="value">0</span></div>
    <div class="status-item"><span class="label">TIME</span><span id="timer" class="value">00:00</span></div>
    <div style="display:flex; flex-direction:column;">
        <button class="small-btn" onclick="togglePause()">PAUSE</button>
        <button class="small-btn" onclick="openResetModal()">RESET</button>
    </div>
</div>

<div id="game-container">
    <div id="watermark">SONG, YOUNG-MIN<br>Guitar Lab</div>
    <div id="chord-notify">MATCH!</div>
    <div id="pauseOverlay" class="modal"><h2>PAUSED</h2><button class="btn-no" onclick="togglePause()">RESUME</button></div>
    <div id="resetModal" class="modal"><h2>RESTART?</h2><button class="btn-yes" onclick="location.reload()">YES</button><button class="btn-no" onclick="closeResetModal()">NO</button></div>
    <canvas id="tetris"></canvas>
</div>

<div id="controls">
    <button class="btn-ctrl" id="leftBtn">◀</button>
    <button class="btn-ctrl" id="downBtn">▼</button>
    <button class="btn-ctrl" id="rightBtn">▶</button>
    <button class="btn-ctrl btn-drop" id="dropBtn">DROP</button>
</div>

<script>
    const canvas = document.getElementById('tetris');
    const ctx = canvas.getContext('2d');
    const nCanvas = document.getElementById('nextCanvas');
    const nCtx = nCanvas.getContext('2d');
    const scoreEl = document.getElementById('score');
    const timeEl = document.getElementById('timer');
    const chordNotify = document.getElementById('chord-notify');

    const ROWS = 18, COLS = 10;
    let SQ = 20;
    const NOTES = ['C', 'D', 'E', 'F', 'G', 'A', 'B'];
    const CHORDS = [
        {k:'CEG', n:'C Major', f:[261.6, 329.6, 392.0]}, {k:'ADF', n:'D minor', f:[293.6, 349.2, 440.0]},
        {k:'BEG', n:'E minor', f:[329.6, 392.0, 493.8]}, {k:'ACF', n:'F Major', f:[349.2, 440.0, 523.2]},
        {k:'BDG', n:'G Major', f:[392.0, 493.8, 587.3]}, {k:'ACE', n:'A minor', f:[440.0, 523.2, 659.2]},
        {k:'BDF', n:'Bm(b5)', f:[493.8, 587.3, 698.4]}
    ];

    let board = [], score = 0, paused = false, isUserPaused = false, gameOver = false;
    let p = null, nextNote = '', dropStart = Date.now(), gameStart = null;
    let lastRiseTime = Date.now();
    let audioCtx = null;
    let particles = []; // 1. 폭발 파티클 배열

    // 1. 스펙타클 폭발 파티클 클래스
    class Particle {
        constructor(x, y, color) {
            this.x = x; this.y = y;
            this.size = Math.random() * 4 + 2;
            this.speedX = (Math.random() - 0.5) * 12;
            this.speedY = (Math.random() - 0.5) * 12 - 3;
            this.gravity = 0.4;
            this.color = color;
            this.life = 1.0;
            this.decay = Math.random() * 0.02 + 0.015;
        }
        update() {
            this.speedY += this.gravity;
            this.x += this.speedX;
            this.y += this.speedY;
            this.life -= this.decay;
        }
        draw() {
            ctx.globalAlpha = this.life;
            ctx.fillStyle = this.color;
            ctx.beginPath();
            ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2);
            ctx.fill();
            ctx.globalAlpha = 1;
        }
    }

    function initAudio() {
        if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
        if (audioCtx.state === 'suspended') audioCtx.resume();
    }

    function playChord(freqs) {
        initAudio();
        const now = audioCtx.currentTime;
        freqs.forEach((f, i) => {
            const osc = audioCtx.createOscillator();
            const g = audioCtx.createGain();
            osc.type = 'triangle';
            osc.frequency.setValueAtTime(f, now + (i * 0.1));
            g.gain.setValueAtTime(0.2, now + (i * 0.1));
            g.gain.exponentialRampToValueAtTime(0.01, now + 0.8 + (i * 0.1));
            osc.connect(g); g.connect(audioCtx.destination);
            osc.start(now + (i * 0.1)); osc.stop(now + 1.0 + (i * 0.1));
        });
    }

    function initBoard() {
        board = Array.from({length: ROWS}, () => Array.from({length: COLS}, () => ({L:null, f:false, h:false, s:1})));
    }

    // 4 & 5. 블록 주황색 + 블랙 테두리 / 500점마다 색 변경
    function drawBlock(ctxObj, x, y, L, f, h, s, size) {
        if (!L && ctxObj === ctx) return;
        ctxObj.save();
        ctxObj.translate(x*size + size/2, y*size + size/2);
        ctxObj.scale(s, s);
        
        // 5. 점수에 따른 테마 색상 결정
        const themeStep = Math.floor(score / 500);
        let baseColor = "#FF8C00"; // 기본 주황
        if (themeStep % 3 === 1) baseColor = "#9C27B0"; // 보라
        if (themeStep % 3 === 2) baseColor = "#009688"; // 청록

        if(L === '#') baseColor = "#FFD700";
        if(L === 'b') baseColor = "#555555";

        ctxObj.fillStyle = h ? "#FFFFFF" : baseColor;
        ctxObj.fillRect(-size/2+1, -size/2+1, size-2, size-2);
        
        // 4. 블랙 테두리
        ctxObj.strokeStyle = "#000000";
        ctxObj.lineWidth = 1.5;
        ctxObj.strokeRect(-size/2+1, -size/2+1, size-2, size-2);

        if(L) {
            ctxObj.fillStyle = (L==='#'||L==='b') ? "#fff" : "#fff";
            ctxObj.font = `bold ${size*0.6}px Arial`; ctxObj.textAlign = "center"; ctxObj.fillText(L, 0, size*0.22);
        }
        ctxObj.restore();
    }

    function drawBoard() {
        ctx.clearRect(0,0,canvas.width,canvas.height);
        for(let r=0; r<ROWS; r++) for(let c=0; c<COLS; c++) drawBlock(ctx, c, r, board[r][c].L, board[r][c].f, board[r][c].h, board[r][c].s, SQ);
        if(p && !gameOver) drawBlock(ctx, p.x, p.y, p.L, false, false, 1, SQ);
        
        // 파티클 렌더링
        particles.forEach((part, i) => {
            part.update();
            part.draw();
            if (part.life <= 0) particles.splice(i, 1);
        });
    }

    // 2. 1분마다 바닥 한 줄 상승
    function riseBottomLine() {
        if (gameOver) return;
        // 맨 윗줄 체크 (게임 오버 방지)
        if (board[0].some(cell => cell.L !== null)) {
            gameOver = true;
            alert("Bottom line pushed to the top! Game Over.");
            return;
        }
        // 위로 한 줄씩 밀기
        for (let r = 0; r < ROWS - 1; r++) {
            board[r] = [...board[r + 1]];
        }
        // 맨 아랫줄 랜덤 알파벳 생성 (#, b 제외)
        board[ROWS - 1] = Array.from({length: COLS}, () => ({
            L: NOTES[Math.floor(Math.random() * 7)], f: false, h: false, s: 1
        }));
        
        // 사운드 효과
        initAudio();
        const osc = audioCtx.createOscillator();
        osc.frequency.setValueAtTime(200, audioCtx.currentTime);
        const g = audioCtx.createGain();
        g.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.5);
        osc.connect(g); g.connect(audioCtx.destination);
        osc.start(); osc.stop(audioCtx.currentTime + 0.5);
        
        if(p && board[p.y][p.x].L) p.y--; // 현재 조각 밀림 방지
        drawBoard();
    }

    function getNote() {
        const r = Math.random();
        if(r < 0.05) return '#';
        if(r < 0.15) return 'b';
        return NOTES[Math.floor(Math.random()*7)];
    }

    class Piece {
        constructor(L) { this.L = L; this.x = 4; this.y = 0; }
        collision(dx, dy) {
            let nx = this.x + dx, ny = this.y + dy;
            if(nx<0 || nx>=COLS || ny>=ROWS) return true;
            if(ny>=0 && board[ny][nx].L) return true;
            return false;
        }
        lock() {
            if(this.y <= 0) { gameOver = true; alert("Game Over!"); return; }
            board[this.y][this.x] = {L: this.L, f: false, h: false, s: 1};
            if(this.L==='#') {
                for(let i=0; i<6; i++){
                    let rr=Math.floor(Math.random()*ROWS), rc=Math.floor(Math.random()*COLS);
                    if(!board[rr][rc].L) board[rr][rc]={L:NOTES[Math.floor(Math.random()*7)],f:true,h:false,s:1};
                }
            } else if(this.L==='b') {
                for(let r=this.y-1; r<=this.y+1; r++) for(let c=this.x-1; c<=this.x+1; c++)
                    if(r>=0 && r<ROWS && c>=0 && c<COLS) board[r][c]={L:null,f:false,h:false,s:1};
            }
            checkBoard();
            p = new Piece(nextNote); nextNote = getNote(); drawNext();
        }
    }

    function findConnectedSameNotes(r, c, note, list) {
        const key = `${r},${c}`;
        if (r<0 || r>=ROWS || c<0 || c>=COLS || !board[r][c].L || board[r][c].L !== note || list.has(key)) return;
        list.add(key);
        findConnectedSameNotes(r+1, c, note, list);
        findConnectedSameNotes(r-1, c, note, list);
        findConnectedSameNotes(r, c+1, note, list);
        findConnectedSameNotes(r, c-1, note, list);
    }

    function checkBoard() {
        let toDel = new Set(); 
        let currentChordFreqs = null;
        let currentChordName = "";
        const dirs = [[0,1],[1,0],[1,1],[1,-1]];

        for(let r=0; r<ROWS; r++) for(let c=0; c<COLS; c++) {
            if(!board[r][c].L || board[r][c].L==='b' || board[r][c].L==='#') continue;
            dirs.forEach(d => {
                let combo = []; 
                for(let i=0; i<3; i++) {
                    let nr=r+d[0]*i, nc=c+d[1]*i;
                    if(nr>=0 && nr<ROWS && nc>=0 && nc<COLS && board[nr][nc].L) combo.push({r:nr, c:nc, L:board[nr][nc].L});
                }
                if(combo.length===3) {
                    let txt = combo.map(v=>v.L).sort().join('');
                    let match = CHORDS.find(ch=>ch.k===txt);
                    if(match || (combo[0].L===combo[1].L && combo[1].L===combo[2].L)) {
                        currentChordName = match ? match.n : `${combo[0].L} Triple`;
                        if(match) currentChordFreqs = match.f;
                        combo.forEach(pos => findConnectedSameNotes(pos.r, pos.c, board[pos.r][pos.c].L, toDel));
                    }
                }
            });
        }

        if(toDel.size > 0) {
            paused = true;
            chordNotify.innerText = currentChordName;
            chordNotify.style.display = "block";
            if(currentChordFreqs) playChord(currentChordFreqs);

            let start = Date.now();
            function ani() {
                let now = Date.now() - start;
                if(now < 600) {
                    toDel.forEach(key => {
                        const [r, c] = key.split(',').map(Number);
                        board[r][c].h = true; board[r][c].s = 1 + (now/600 * 0.5);
                    });
                    drawBoard(); requestAnimationFrame(ani);
                } else {
                    // 1. 사라질 때 파티클 생성
                    toDel.forEach(key => {
                        const [r, c] = key.split(',').map(Number);
                        for (let i = 0; i < 8; i++) {
                            particles.push(new Particle(c*SQ + SQ/2, r*SQ + SQ/2, "#FFEB3B"));
                        }
                        board[r][c] = {L:null, f:false, h:false, s:1};
                    });
                    score += toDel.size * 10;
                    scoreEl.innerText = score;
                    chordNotify.style.display = "none";
                    applyGravity();
                    paused = false; drawBoard(); checkBoard();
                }
            }
            ani();
        }
    }

    function applyGravity() {
        for(let c=0; c<COLS; c++) for(let r=ROWS-1; r>0; r--) if(!board[r][c].L) {
            for(let k=r-1; k>=0; k--) if(board[k][c].L && !board[k][c].f) {
                board[r][c]=board[k][c]; board[k][c]={L:null,f:false,h:false,s:1}; break;
            }
        }
    }

    function togglePause() { isUserPaused = !isUserPaused; document.getElementById('pauseOverlay').style.display = isUserPaused ? 'block' : 'none'; }
    function openResetModal() { isUserPaused = true; document.getElementById('resetModal').style.display = 'block'; }
    function closeResetModal() { isUserPaused = false; document.getElementById('resetModal').style.display = 'none'; }

    function run() {
        if(!paused && !isUserPaused && !gameOver) {
            let now = Date.now();
            if(now - dropStart > 900) {
                if(!p.collision(0,1)) { p.y++; } else { p.lock(); }
                dropStart = now;
            }
            
            // 2. 1분(60000ms)마다 바닥 한 줄 상승
            if (now - lastRiseTime > 60000) {
                riseBottomLine();
                lastRiseTime = now;
            }

            let diff = Math.floor((now - gameStart)/1000);
            timeEl.innerText = `${Math.floor(diff/60).toString().padStart(2,'0')}:${(diff%60).toString().padStart(2,'0')}`;
        }
        drawBoard();
        requestAnimationFrame(run);
    }

    function drawNext() {
        nCtx.clearRect(0,0,40,40);
        drawBlock(nCtx, 0, 0, nextNote, false, false, 1, 40);
    }

    function resize() {
        const container = document.getElementById('game-container');
        SQ = Math.min(container.clientWidth / (COLS+1), container.clientHeight / (ROWS+1));
        canvas.width = COLS * SQ; canvas.height = ROWS * SQ;
        drawBoard();
    }

    // 컨트롤 이벤트
    document.getElementById('leftBtn').addEventListener('touchstart', (e) => { e.preventDefault(); initAudio(); if(!p.collision(-1,0)&&!isUserPaused) p.x--; });
    document.getElementById('rightBtn').addEventListener('touchstart', (e) => { e.preventDefault(); initAudio(); if(!p.collision(1,0)&&!isUserPaused) p.x++; });
    document.getElementById('downBtn').addEventListener('touchstart', (e) => { e.preventDefault(); initAudio(); if(!p.collision(0,1)&&!isUserPaused) p.y++; });
    document.getElementById('dropBtn').addEventListener('touchstart', (e) => { e.preventDefault(); initAudio(); if(!isUserPaused){while(!p.collision(0,1)) p.y++; p.lock();} });

    window.onload = () => {
        initBoard(); resize();
        p = new Piece(getNote()); nextNote = getNote(); drawNext();
        setTimeout(() => {
            gameStart = Date.now(); lastRiseTime = Date.now(); run();
        }, 100);
    };
    window.onresize = resize;
</script>
</body>
</html>
