<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Song Young-Min Guitar Lab - Ultimate</title>
    <style>
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; touch-action: none; }
        /* 4. 전체 배경: 연한 갈색 */
        body { background-color: #d7ccc8; margin: 0; color: #3e2723; font-family: 'Malgun Gothic', sans-serif; overflow: hidden; display: flex; flex-direction: column; height: 100vh; }
        
        #splash { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: #3d2b1f; display: flex; flex-direction: column; justify-content: center; align-items: center; z-index: 200; transition: opacity 0.8s ease; }
        
        #top-bar { background: #5d4037; display: flex; justify-content: space-between; align-items: center; padding: 10px 15px; height: 90px; border-bottom: 3px solid #3e2723; color: #fff; }
        .status-item { text-align: center; flex: 1; }
        .label { font-size: 10px; color: #d7ccc8; display: block; }
        .value { font-size: 18px; color: #ffeb3b; font-weight: bold; }
        
        #game-container { flex: 1; position: relative; display: flex; justify-content: center; align-items: center; background: #d7ccc8; overflow: hidden; }
        
        /* 3. 정자체 워터마크 (60% 투명도) */
        #watermark { 
            position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%);
            font-size: 24px; font-weight: 900; color: rgba(62, 39, 35, 0.15); 
            white-space: nowrap; pointer-events: none; z-index: 1; text-align: center;
        }

        /* 4. 게임 배경: 회색 */
        canvas#tetris { background: #757575; border: 4px solid #3e2723; z-index: 2; }
        
        #chord-notify { position: absolute; top: 30%; width: 100%; text-align: center; font-size: 40px; font-weight: 900; color: #ffeb3b; z-index: 50; display: none; pointer-events: none; text-shadow: 2px 2px 5px #000; }

        #controls { background: #5d4037; display: grid; grid-template-columns: 1fr 1fr 1fr 0.6fr; gap: 8px; padding: 12px; height: 130px; border-top: 3px solid #3e2723; }
        .btn-ctrl { background: #8d6e63; color: #fff; border: none; border-radius: 12px; font-size: 38px; display: flex; justify-content: center; align-items: center; box-shadow: 0 5px #3e2723; }
        .btn-drop { background: #bf360c; font-size: 12px; font-weight: 900; height: 60%; align-self: center; border-radius: 8px; }
        .small-btn { padding: 6px 10px; font-size: 11px; background: #3e2723; color: #fff; border: 1px solid #8d6e63; border-radius: 4px; margin-bottom: 3px; }
    </style>
</head>
<body>

<div id="splash">
    <h1 style="color:#ffca28; text-align:center; font-size: 28px;">SONG, YOUNG-MIN<br>Guitar Lab</h1>
    <p style="color:#bcaaa4;">Loading Music & Art...</p>
</div>

<div id="top-bar">
    <div class="status-item">
        <span class="label">NEXT</span>
        <canvas id="nextCanvas" width="40" height="40"></canvas>
    </div>
    <div class="status-item"><span class="label">SCORE</span><span id="score" class="value">0</span></div>
    <div class="status-item"><span class="label">TIME</span><span id="timer" class="value">00:00</span></div>
    <div style="display:flex; flex-direction:column;">
        <button class="small-btn" onclick="location.reload()">RESET</button>
    </div>
</div>

<div id="game-container">
    <div id="watermark">SONG, YOUNG-MIN<br>Guitar Lab</div>
    <div id="chord-notify">PERFECT!</div>
    <canvas id="tetris"></canvas>
</div>

<div id="controls">
    <button class="btn-ctrl" id="leftBtn">◀</button>
    <button class="btn-ctrl" id="downBtn">▼</button>
    <button class="btn-ctrl" id="rightBtn">▶</button>
    <button class="btn-ctrl btn-drop" id="dropBtn">DROP</button>
</div>

<script>
    const canvas = document.getElementById('tetris');
    const ctx = canvas.getContext('2d');
    const nCanvas = document.getElementById('nextCanvas');
    const nCtx = nCanvas.getContext('2d');
    const scoreEl = document.getElementById('score');
    const timeEl = document.getElementById('timer');
    const chordNotify = document.getElementById('chord-notify');

    const ROWS = 18, COLS = 10;
    let SQ = 20;
    const NOTES = ['C', 'D', 'E', 'F', 'G', 'A', 'B'];
    const CHORDS = [
        {k:'CEG', n:'C Major', f:[261, 329, 392]}, {k:'ADF', n:'D minor', f:[293, 349, 440]},
        {k:'BEG', n:'E minor', f:[329, 392, 493]}, {k:'ACF', n:'F Major', f:[349, 440, 523]},
        {k:'BDG', n:'G Major', f:[392, 493, 587]}, {k:'ACE', n:'A minor', f:[440, 523, 659]},
        {k:'BDF', n:'Bm(b5)', f:[493, 587, 698]}
    ];

    let board = [], score = 0, paused = false, gameOver = false;
    let p = null, nextNote = '', dropStart = Date.now(), gameStart = null;
    let lastRiseTime = Date.now();
    let audioCtx = null;
    let particles = [];

    // 1. 나무 블록 효과음 (복구)
    function playWoodHit() {
        initAudio();
        const now = audioCtx.currentTime;
        const osc = audioCtx.createOscillator();
        const g = audioCtx.createGain();
        osc.type = 'sine';
        osc.frequency.setValueAtTime(150, now);
        osc.frequency.exponentialRampToValueAtTime(40, now + 0.1);
        g.gain.setValueAtTime(0.3, now);
        g.gain.exponentialRampToValueAtTime(0.01, now + 0.1);
        osc.connect(g); g.connect(audioCtx.destination);
        osc.start(); osc.stop(now + 0.1);
    }

    function initAudio() {
        if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
        if (audioCtx.state === 'suspended') audioCtx.resume();
    }

    function playChord(freqs) {
        initAudio();
        const now = audioCtx.currentTime;
        freqs.forEach((f, i) => {
            const osc = audioCtx.createOscillator();
            const g = audioCtx.createGain();
            osc.type = 'triangle';
            osc.frequency.setValueAtTime(f, now + (i * 0.08));
            g.gain.setValueAtTime(0.15, now + (i * 0.08));
            g.gain.exponentialRampToValueAtTime(0.01, now + 0.6 + (i * 0.08));
            osc.connect(g); g.connect(audioCtx.destination);
            osc.start(now + (i * 0.08)); osc.stop(now + 0.8 + (i * 0.08));
        });
    }

    // 3. 특수 폭발 파티클
    class Particle {
        constructor(x, y, color, speedScale = 1) {
            this.x = x; this.y = y;
            this.size = Math.random() * 5 + 2;
            this.speedX = (Math.random() - 0.5) * 10 * speedScale;
            this.speedY = (Math.random() - 0.5) * 10 * speedScale - 2;
            this.gravity = 0.3;
            this.color = color;
            this.life = 1.0;
            this.decay = Math.random() * 0.02 + 0.02;
        }
        update() {
            this.speedY += this.gravity;
            this.x += this.speedX; this.y += this.speedY;
            this.life -= this.decay;
        }
        draw() {
            ctx.globalAlpha = this.life;
            ctx.fillStyle = this.color;
            ctx.beginPath(); ctx.arc(this.x, this.y, this.size, 0, Math.PI*2); ctx.fill();
            ctx.globalAlpha = 1;
        }
    }

    function initBoard() {
        board = Array.from({length: ROWS}, () => Array.from({length: COLS}, () => ({L:null, f:false, h:false, s:1})));
    }

    function drawBoard() {
        ctx.clearRect(0,0,canvas.width,canvas.height);
        // 4. 하얀색 눈금선
        ctx.strokeStyle = "rgba(255, 255, 255, 0.2)";
        ctx.lineWidth = 1;
        for(let r=0; r<=ROWS; r++) { ctx.beginPath(); ctx.moveTo(0, r*SQ); ctx.lineTo(COLS*SQ, r*SQ); ctx.stroke(); }
        for(let c=0; c<=COLS; c++) { ctx.beginPath(); ctx.moveTo(c*SQ, 0); ctx.lineTo(c*SQ, ROWS*SQ); ctx.stroke(); }

        for(let r=0; r<ROWS; r++) for(let c=0; c<COLS; c++) {
            if(board[r][c].L) drawBlock(ctx, c, r, board[r][c].L, board[r][c].f, board[r][c].h, board[r][c].s, SQ);
        }
        if(p && !gameOver) drawBlock(ctx, p.x, p.y, p.L, false, false, 1, SQ);
        
        particles.forEach((part, i) => {
            part.update(); part.draw();
            if(part.life <= 0) particles.splice(i, 1);
        });
    }

    function drawBlock(ctxObj, x, y, L, f, h, s, size) {
        ctxObj.save();
        ctxObj.translate(x*size + size/2, y*size + size/2);
        ctxObj.scale(s, s);
        
        // 4. 주황색 배경 + 블랙 테두리
        const themeStep = Math.floor(score / 500);
        let baseColor = (themeStep % 2 === 0) ? "#FF8C00" : "#7E57C2"; 
        if(L === '#') baseColor = "#424242";
        if(L === 'b') baseColor = "#D32F2F";

        ctxObj.fillStyle = h ? "#fff" : baseColor;
        ctxObj.fillRect(-size/2+1, -size/2+1, size-2, size-2);
        
        ctxObj.strokeStyle = "#000"; // 블랙 테두리
        ctxObj.lineWidth = 1.5;
        ctxObj.strokeRect(-size/2+1, -size/2+1, size-2, size-2);

        if(L) {
            ctxObj.fillStyle = "#fff";
            ctxObj.font = `bold ${size*0.6}px Arial`; ctxObj.textAlign = "center"; ctxObj.fillText(L, 0, size*0.22);
        }
        ctxObj.restore();
    }

    function getNote() {
        const r = Math.random();
        if(r < 0.05) return '#';
        if(r < 0.15) return 'b';
        return NOTES[Math.floor(Math.random()*7)];
    }

    class Piece {
        constructor(L) { this.L = L; this.x = 4; this.y = 0; }
        collision(dx, dy) {
            let nx = this.x + dx, ny = this.y + dy;
            if(nx<0 || nx>=COLS || ny>=ROWS) return true;
            if(ny>=0 && board[ny][nx].L) return true;
            return false;
        }
        lock() {
            if(this.y <= 0) { gameOver = true; alert("Game Over!"); return; }
            board[this.y][this.x] = {L: this.L, f: false, h: false, s: 1};
            playWoodHit(); // 1. 나무 소리
            
            if(this.L === '#') {
                // 기존 # 로직 유지 (특수 기능)
            } else if(this.L === 'b') {
                for(let r=this.y-1; r<=this.y+1; r++) for(let c=this.x-1; c<=this.x+1; c++)
                    if(r>=0 && r<ROWS && c>=0 && c<COLS) board[r][c]={L:null,f:false,h:false,s:1};
            }
            checkBoard();
            p = new Piece(nextNote); nextNote = getNote(); drawNext();
        }
    }

    function findConnectedSameNotes(r, c, note, list) {
        const key = `${r},${c}`;
        if (r<0 || r>=ROWS || c<0 || c>=COLS || !board[r][c].L || board[r][c].L !== note || list.has(key)) return;
        list.add(key);
        findConnectedSameNotes(r+1, c, note, list);
        findConnectedSameNotes(r-1, c, note, list);
        findConnectedSameNotes(r, c+1, note, list);
        findConnectedSameNotes(r, c-1, note, list);
    }

    function checkBoard() {
        let toDel = new Set(); 
        let currentChordFreqs = null;
        let isSpecialExplosion = false; // 3. 특수 폭발 여부
        const dirs = [[0,1],[1,0],[1,1],[1,-1]];

        for(let r=0; r<ROWS; r++) for(let c=0; c<COLS; c++) {
            if(!board[r][c].L || board[r][c].L==='b') continue;
            dirs.forEach(d => {
                let combo = []; 
                for(let i=0; i<3; i++) {
                    let nr=r+d[0]*i, nc=c+d[1]*i;
                    if(nr>=0 && nr<ROWS && nc>=0 && nc<COLS && board[nr][nc].L) combo.push({r:nr, c:nc, L:board[nr][nc].L});
                }
                if(combo.length===3) {
                    let txt = combo.map(v=>v.L).sort().join('');
                    let match = CHORDS.find(ch=>ch.k===txt);
                    
                    // 2. #블록 3개 뭉침 체크 포함
                    let isSame = (combo[0].L===combo[1].L && combo[1].L===combo[2].L);

                    if(match || isSame) {
                        if(match) currentChordFreqs = match.f;
                        if(isSame) isSpecialExplosion = true; // CCC나 ###은 특수 폭발
                        combo.forEach(pos => findConnectedSameNotes(pos.r, pos.c, board[pos.r][pos.c].L, toDel));
                    }
                }
            });
        }

        if(toDel.size > 0) {
            paused = true;
            if(currentChordFreqs) playChord(currentChordFreqs);
            
            let start = Date.now();
            function ani() {
                let now = Date.now() - start;
                if(now < 500) {
                    toDel.forEach(key => {
                        const [r, c] = key.split(',').map(Number);
                        board[r][c].h = true; board[r][c].s = 1 + (now/500 * 0.4);
                    });
                    drawBoard(); requestAnimationFrame(ani);
                } else {
                    toDel.forEach(key => {
                        const [r, c] = key.split(',').map(Number);
                        // 3. 폭발 연출 차별화
                        let pCount = isSpecialExplosion ? 25 : 10;
                        let pColor = isSpecialExplosion ? "#FFFFFF" : "#FFEB3B";
                        let pSpeed = isSpecialExplosion ? 1.8 : 1;
                        for(let i=0; i<pCount; i++) particles.push(new Particle(c*SQ + SQ/2, r*SQ + SQ/2, pColor, pSpeed));
                        board[r][c] = {L:null, f:false, h:false, s:1};
                    });
                    score += toDel.size * 10;
                    scoreEl.innerText = score;
                    applyGravity();
                    paused = false; drawBoard(); checkBoard();
                }
            }
            ani();
        }
    }

    function applyGravity() {
        for(let c=0; c<COLS; c++) for(let r=ROWS-1; r>0; r--) if(!board[r][c].L) {
            for(let k=r-1; k>=0; k--) if(board[k][c].L && !board[k][c].f) {
                board[r][c]=board[k][c]; board[k][c]={L:null,f:false,h:false,s:1}; break;
            }
        }
    }

    function riseBottomLine() {
        for(let r=0; r<ROWS-1; r++) board[r] = [...board[r+1]];
        board[ROWS-1] = Array.from({length: COLS}, () => ({
            L: NOTES[Math.floor(Math.random()*7)], f:false, h:false, s:1
        }));
        drawBoard();
    }

    function run() {
        if(!paused && !gameOver) {
            let now = Date.now();
            if(now - dropStart > 1000) {
                if(!p.collision(0,1)) { p.y++; } else { p.lock(); }
                dropStart = now;
            }
            if(now - lastRiseTime > 60000) { riseBottomLine(); lastRiseTime = now; }
            let diff = Math.floor((now - gameStart)/1000);
            timeEl.innerText = `${Math.floor(diff/60).toString().padStart(2,'0')}:${(diff%60).toString().padStart(2,'0')}`;
        }
        drawBoard();
        requestAnimationFrame(run);
    }

    function drawNext() {
        nCtx.clearRect(0,0,40,40);
        drawBlock(nCtx, 0, 0, nextNote, false, false, 1, 40);
    }

    function resize() {
        const container = document.getElementById('game-container');
        SQ = Math.min(container.clientWidth / (COLS+1), container.clientHeight / (ROWS+1));
        canvas.width = COLS * SQ; canvas.height = ROWS * SQ;
    }

    document.getElementById('leftBtn').addEventListener('touchstart', (e) => { e.preventDefault(); if(!p.collision(-1,0)) p.x--; });
    document.getElementById('rightBtn').addEventListener('touchstart', (e) => { e.preventDefault(); if(!p.collision(1,0)) p.x++; });
    document.getElementById('downBtn').addEventListener('touchstart', (e) => { e.preventDefault(); if(!p.collision(0,1)) p.y++; });
    document.getElementById('dropBtn').addEventListener('touchstart', (e) => { e.preventDefault(); while(!p.collision(0,1)) p.y++; p.lock(); });

    window.onload = () => {
        initBoard(); resize();
        p = new Piece(getNote()); nextNote = getNote(); drawNext();
        setTimeout(() => {
            document.getElementById('splash').style.opacity = '0';
            setTimeout(() => {
                document.getElementById('splash').style.display = 'none';
                gameStart = Date.now(); lastRiseTime = Date.now(); run();
            }, 800);
        }, 2000);
    };
    window.onresize = resize;
</script>
</body>
</html>
